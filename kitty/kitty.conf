
disable_ligatures never

# :: Gruvbox Material colors
foreground #d4be98
background #282828

# :: Selection colors
selection_foreground none
selection_background #504945

# :: Normal colors
color0  #282828
color1  #ea6962
color2  #a9b665
color3  #d8a657
color4  #7daea3
color5  #d3869b
color6  #89b482
color7  #d4be98

# :: Bright colors
color8   #928374
color9   #f2594b
color10  #b8bb26
color11  #fabd2f
color12  #83a598
color13  #d3869b
color14  #8ec07c
color15  #ebdbb2


# :: Font
font_family      FiraCode Nerd Font
font_size        9.0

# :: Window padding
window_padding_width 14

# :: Remove window decorations (like Alacritty's "None")
hide_window_decorations yes

# # :: Shell
# shell /usr/bin/fish

# :: Keybindings
# :: Toggle fullscreen with Alt+Return
map alt+enter toggle_fullscreen

# :: Mouse bindings
# :: Middle click paste (this is actually Kitty's default behavior)
mouse_map middle release ungrabbed paste_from_selection

